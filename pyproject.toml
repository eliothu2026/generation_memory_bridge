[project]
name = "narrator-flow"
version = "0.1.0"
description = "口述史实时分析 Agent (CrewAI Flows demo)"
requires-python = ">=3.10,<3.13"
dependencies = [
    "crewai[tools]>=0.80.0",
    "pydantic>=2.0",
    "python-dotenv>=1.0",
]

[project.scripts]
narrator_flow = "narrator_flow.main:run"

[build-system]
requires = ["setuptools>=68.0"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["src"]
